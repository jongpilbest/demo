server {
    listen 80;
    server_name safesignal.cloud www.safesignal.cloud;

    # HTTP → HTTPS 리다이렉트
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name safesignal.cloud www.safesignal.cloud;

    ssl_certificate /etc/letsencrypt/live/www.safesignal.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.safesignal.cloud/privkey.pem;

    # API 요청만 백엔드로 프록시
    location /api/ {
        proxy_pass http://backend:8085;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 나머지는 모두 정적 파일 서빙 (React SPA)
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }
}