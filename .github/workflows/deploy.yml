name: Deploy to Test Server - Subsidence Monitoring System

on:
  push:
    branches:
      - main
      - fc  # 현재 작업 중인 브랜치

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cache Gradle dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache Node.js dependencies
        uses: actions/cache@v3
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Deploy to Test Server
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.TEST_SERVER_HOST }}
          username: ${{ secrets.TEST_SERVER_USER }}
          key: ${{ secrets.TEST_SERVER_SSH_KEY }}
          port: ${{ secrets.TEST_SERVER_PORT || 22 }}
          command_timeout: 45m
          script: |
            echo " 스마트 계측 홍보 웹사이트 배포 시작 ... "

            # 🔹 프로젝트 디렉토리로 이동
            cd ~/subsidence || { echo "프로젝트 디렉토리가 없습니다. 먼저 git clone을 실행하세요."; exit 1; }

            # 🔹 최신 코드 가져오기
            echo "🔹 최신 코드 Pull 중..."
            git fetch origin
            git pull origin ${{ github.ref_name }}

            # 🔹 백엔드 빌드
            echo "🔹 Spring Boot 애플리케이션 빌드 중..."
            chmod +x gradlew
            ./gradlew clean bootJar -x test

            # 🔹 프론트엔드 빌드
            echo "🔹 React 애플리케이션 빌드 중..."
            cd frontend
            npm install --legacy-peer-deps
            NODE_OPTIONS="--max-old-space-size=3072" npm run build
            cd ..

            # 🔹 기존 애플리케이션 중지
            echo "🔹 기존 애플리케이션 중지 중..."
            if [ -f ~/subsidence/app.pid ]; then
              PID=$(cat ~/subsidence/app.pid)
              if ps -p $PID > /dev/null; then
                kill -TERM $PID
                echo "애플리케이션 종료 중... (PID: $PID)"
                sleep 10
                if ps -p $PID > /dev/null; then
                  kill -KILL $PID
                  echo "강제 종료 완료"
                fi
              fi
              rm ~/subsidence/app.pid
            fi

            # Docker 방식 사용하는 경우
            if [ -f docker-compose.yml ]; then
              echo "🔹 Docker 컨테이너 배포 중..."
              docker-compose down || true
              docker-compose up --build -d
              echo "🔹 Docker 배포 완료!"
            else
              # JAR 직접 실행 방식
              echo "🔹 새 애플리케이션 시작 중..."

              # 프론트 빌드 결과물을 Spring Boot static 폴더에 복사
              rm -rf src/main/resources/static/*
              cp -r frontend/dist/* src/main/resources/static/

              # JAR 재빌드 (정적 파일 포함)
              ./gradlew bootJar -x test

              # 백그라운드에서 애플리케이션 실행
              nohup java -jar \
                -Xms512m -Xmx2g \
                -XX:+UseG1GC \
                -XX:G1HeapRegionSize=16m \
                -Dspring.profiles.active=prod \
                build/libs/subsidence-0.0.1-SNAPSHOT.jar \
                --server.port=8007 > app.log 2>&1 &

              # PID 저장
              echo $! > ~/subsidence/app.pid

              # 애플리케이션 시작 확인
              sleep 10
              if ps -p $(cat ~/subsidence/app.pid) > /dev/null; then
                echo "🎉 애플리케이션이 성공적으로 시작되었습니다!"
                echo "📍 테스트 서버 접속 주소: https://${{ secrets.TEST_SERVER_HOST }}:8007"
              else
                echo "❌ 애플리케이션 시작에 실패했습니다."
                echo "로그 확인:"
                tail -50 ~/subsidence/app.log
                exit 1
              fi
            fi

            echo "🎯 배포 완료! 🎯"
