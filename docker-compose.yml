version: '3.8'

services:
  db:
    image: mariadb:10.6
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: safesignal_website
      MYSQL_USER: asincnt
      MYSQL_PASSWORD: asincnt1013
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-proot" ]
      timeout: 20s
      retries: 10

  backend:
    build: .
    expose:
      - "8085"          # ← ports 대신 expose로 변경 (외부 노출 X)
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mariadb://db:3306/safesignal_website
      SPRING_DATASOURCE_USERNAME: asincnt
      SPRING_DATASOURCE_PASSWORD: asincnt1013

  frontend:
    build: ./frontend
    ports:
      - "80:80"         # ← 3000:80 → 80:80으로 변경
    depends_on:
      - backend

volumes:
  db_data: